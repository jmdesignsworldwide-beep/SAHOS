name: Supabase migrations

# Applies any new SQL migration in supabase/migrations/ to the linked Supabase
# project whenever it lands on main. Runs `supabase db push`, which applies only
# migrations not yet recorded in the remote's migration history — so it is safe
# to re-run and never re-applies an already-applied migration.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token
#                            (Supabase → Account → Access Tokens)
#   SUPABASE_DB_PASSWORD   — the project's database password
#                            (Supabase → Project Settings → Database)
#   SUPABASE_PROJECT_REF   — the project ref (the xxxx in xxxx.supabase.co)
#                            (Supabase → Project Settings → General)
#
# Until those secrets exist the workflow is a clean no-op (it logs a notice and
# exits successfully), so merges are never blocked.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch: {}

# Never run two migration pushes at once against the same database.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Supabase secrets are configured
        id: cfg
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$PROJECT_REF" ] || [ -z "$ACCESS_TOKEN" ] || [ -z "$DB_PASSWORD" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Supabase migrations skipped::Set SUPABASE_PROJECT_REF, SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD in repo secrets to enable automatic migrations."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Supabase CLI
        if: steps.cfg.outputs.configured == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: steps.cfg.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply migrations
        if: steps.cfg.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
